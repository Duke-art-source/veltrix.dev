name: Deploy backend to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "ERROR: RENDER_API_KEY secret is not set."
            exit 1
          fi
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "ERROR: RENDER_SERVICE_ID secret is not set."
            exit 1
          fi

          response=$(curl -s -o /tmp/render-deploy-response.json -w "%{http_code}" \
            -X POST "https://api.render.com/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"serviceId":"'$RENDER_SERVICE_ID'"}')
          echo "Render API response code: $response"
          cat /tmp/render-deploy-response.json
          if [ "$response" -ge 300 ]; then
            echo "Render deploy failed"
            exit 1
          fi
